        max-width: 700px;
        margin: 2rem auto;
 
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        transition: all 0.3s ease-in-out;
      }
 
      .container:hover {
        background: rgba(238, 238, 238, 0.08);
        border-color: rgba(255, 0, 182, 0.3);
      }

      .social-link {
